<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Zipic Logo - Compressed Essence Philosophy -->
  <!-- A visual expression of image compression through geometric transformation -->

  <!-- Background circle - primary green -->
  <circle cx="50" cy="50" r="48" fill="#10b981"/>

  <!-- Subtle inner ring for depth -->
  <circle cx="50" cy="50" r="45.5" fill="none" stroke="#059669" stroke-width="0.5"/>

  <!-- Large rectangle (original image) - upper left -->
  <rect x="12" y="18" width="48" height="42" rx="2" ry="2" fill="none" stroke="white" stroke-width="3.2"/>

  <!-- Mountain landscape in large frame -->
  <path d="M15 55 L22 38 L30 48 L40 28 L50 42 L56 55" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.75"/>

  <!-- Sun in large frame -->
  <circle cx="52" cy="26" r="4" fill="white" opacity="0.75"/>

  <!-- Small rectangle (compressed output) - lower right -->
  <rect x="58" y="50" width="30" height="26" rx="2" ry="2" fill="none" stroke="white" stroke-width="2.4"/>

  <!-- Simplified mountain in small frame -->
  <path d="M60 73 L68 62 L76 66 L85 73" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>

  <!-- Transformation arrow -->
  <path d="M56 58 L62 54" stroke="white" stroke-width="3" stroke-linecap="round"/>

  <!-- Arrowhead -->
  <polygon points="62,54 67,52 64,59" fill="white"/>

  <!-- ZIP text - minimal typography -->
  <text x="50" y="90" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="10" font-weight="600" letter-spacing="2">ZIP</text>
</svg>