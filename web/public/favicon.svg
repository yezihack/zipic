<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="#10b981"/>

  <!-- Outer image frame (original) -->
  <rect x="15" y="25" width="45" height="35" rx="3" fill="none" stroke="white" stroke-width="2.5" opacity="0.9"/>

  <!-- Inner image frame (compressed) -->
  <rect x="55" y="42" width="30" height="25" rx="2" fill="none" stroke="white" stroke-width="2" opacity="0.7"/>

  <!-- Compression arrow -->
  <path d="M38 55 L58 48" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.8"/>
  <polygon points="56,45 62,47 58,52" fill="white" opacity="0.8"/>

  <!-- Image content in original (mountain) -->
  <path d="M18 55 L28 42 L38 52 L48 38" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
  <circle cx="48" cy="32" r="3" fill="white" opacity="0.6"/>

  <!-- Image content in compressed (simplified mountain) -->
  <path d="M58 62 L68 52 L78 60" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>

  <!-- Size reduction indicator -->
  <text x="50" y="85" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="10" font-weight="bold" opacity="0.9">ZIP</text>
</svg>