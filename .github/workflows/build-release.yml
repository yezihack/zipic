name: Build Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: false
        default: ''

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            ext: ''
            archive: tar.gz
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            ext: ''
            archive: tar.gz
          - os: windows-latest
            goos: windows
            goarch: amd64
            ext: .exe
            archive: zip
          - os: macos-latest
            goos: darwin
            goarch: amd64
            ext: ''
            archive: tar.gz
          - os: macos-latest
            goos: darwin
            goarch: arm64
            ext: ''
            archive: tar.gz

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Get version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION="v0.0.0-dev"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Build frontend
        shell: bash
        run: |
          cd web
          pnpm install
          pnpm build

      - name: Build backend
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          cd backend

          VERSION="${{ steps.version.outputs.version }}"
          BUILD_DATE=$(date -u '+%Y-%m-%d %H:%M:%S')
          GIT_COMMIT=$(git rev-parse --short HEAD)

          mkdir -p bin

          go build -trimpath -ldflags="-s -w \
            -X 'main.Version=${VERSION}' \
            -X 'main.BuildDate=${BUILD_DATE}' \
            -X 'main.GitCommit=${GIT_COMMIT}'" \
            -o bin/zipic${{ matrix.ext }} ./cmd/server

          echo "Build completed: zipic${{ matrix.ext }}"

      - name: Create archive (Linux/macOS)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ARCHIVE_NAME="zipic-${VERSION}-${{ matrix.goos }}-${{ matrix.goarch }}"

          mkdir -p release/$ARCHIVE_NAME
          cp backend/bin/zipic${{ matrix.ext }} release/$ARCHIVE_NAME/
          cp README.md release/$ARCHIVE_NAME/
          cp LICENSE release/$ARCHIVE_NAME/

          cd release
          tar -czvf $ARCHIVE_NAME.tar.gz $ARCHIVE_NAME

          echo "archive_path=release/$ARCHIVE_NAME.tar.gz" >> $GITHUB_ENV
          echo "archive_name=$ARCHIVE_NAME.tar.gz" >> $GITHUB_ENV

      - name: Create archive (Windows)
        if: matrix.archive == 'zip'
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ARCHIVE_NAME="zipic-${VERSION}-${{ matrix.goos }}-${{ matrix.goarch }}"

          mkdir -p release/$ARCHIVE_NAME
          cp backend/bin/zipic${{ matrix.ext }} release/$ARCHIVE_NAME/
          cp README.md release/$ARCHIVE_NAME/
          cp LICENSE release/$ARCHIVE_NAME/

          cd release
          7z a -tzip $ARCHIVE_NAME.zip $ARCHIVE_NAME

          echo "archive_path=release/$ARCHIVE_NAME.zip" >> $GITHUB_ENV
          echo "archive_name=$ARCHIVE_NAME.zip" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zipic-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ${{ env.archive_path }}
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.version != '')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${{ github.ref_name }}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Zipic ${{ steps.version.outputs.version }}
          body: |
            ## Zipic ${{ steps.version.outputs.version }}

            ### Downloads
            | Platform | Architecture | File |
            |----------|--------------|------|
            | Windows | x64 | `zipic-${{ steps.version.outputs.version }}-windows-amd64.zip` |
            | Linux | x64 | `zipic-${{ steps.version.outputs.version }}-linux-amd64.tar.gz` |
            | Linux | ARM64 | `zipic-${{ steps.version.outputs.version }}-linux-arm64.tar.gz` |
            | macOS | x64 | `zipic-${{ steps.version.outputs.version }}-darwin-amd64.tar.gz` |
            | macOS | ARM64 (M1/M2) | `zipic-${{ steps.version.outputs.version }}-darwin-arm64.tar.gz` |

            ### Usage
            **Windows:**
            ```bash
            unzip zipic-*-windows-amd64.zip
            cd zipic-*-windows-amd64
            ./zipic.exe
            ```

            **Linux/macOS:**
            ```bash
            tar -xzf zipic-*-linux-amd64.tar.gz
            cd zipic-*-linux-amd64
            chmod +x zipic
            ./zipic
            ```

            Access: http://localhost:8040
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}